name: palette

services:
  postgres:
    image: postgres:17-alpine@sha256:dc17045ccfd343b49600570ea734b9c4991cf1c3f3302e67df51e3b402dd55c4
    profiles: ["deps"]
    environment:
      POSTGRES_DB: palette
      POSTGRES_USER: palette
      POSTGRES_PASSWORD: palette
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palette -d palette"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.11-alpine@sha256:e4bf19f15fd3218814a4e3c9e0064e1334bd8aa20d5984b9f1a0afd084f8cc00
    profiles: ["deps"]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    profiles: ["deps"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  paletted:
    image: ${PALETTED_IMAGE:-ghcr.io/jadenfix/palette/paletted:main}
    # The image default (auth-mode required, #127) refuses anonymous access.
    # This dev stack opts INTO the insecure local mode explicitly. We must
    # repeat the image CMD args because compose `command` overrides them.
    # `--allow-insecure-non-loopback` is required: local mode disables API-key
    # auth and paletted otherwise refuses a non-loopback (0.0.0.0) bind; here the
    # container is reachable only on the trusted compose network.
    command:
      [
        "--addr",
        "0.0.0.0:8080",
        "--otlp-grpc-addr",
        "0.0.0.0:4317",
        "--data-dir",
        "/data",
        "--auth-mode",
        "local",
        "--allow-insecure-non-loopback",
      ]
    environment:
      PALETTE_TRACE_WRITE_DRAIN_INTERVAL_MS: "250"
      PALETTE_TRACE_INGESTED_DRAIN_INTERVAL_MS: "250"
    ports:
      - "${PALETTE_HTTP_PORT:-8080}:8080"
      - "${PALETTE_OTLP_GRPC_PORT:-4317}:4317"
    volumes:
      - palette-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  dashboard:
    image: ${PALETTE_DASHBOARD_IMAGE:-ghcr.io/jadenfix/palette/dashboard:main}
    depends_on:
      paletted:
        condition: service_healthy
    environment:
      PALETTE_API_BASE_URL: http://paletted:8080
      NEXT_PUBLIC_PALETTE_API_BASE_URL: http://localhost:${PALETTE_HTTP_PORT:-8080}
      PALETTE_GATE2_CONFIRMATION_SALT: ${PALETTE_GATE2_CONFIRMATION_SALT:-}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "${PALETTE_DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/?tenant=demo&project=demo&environment=local').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  dashboard-e2e:
    image: ${PALETTE_DASHBOARD_E2E_IMAGE:-ghcr.io/jadenfix/palette/dashboard-e2e:main}
    profiles: ["proof"]
    depends_on:
      dashboard:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://dashboard:3000
      PALETTE_GATE2_CONFIRMATION_SALT: ${PALETTE_GATE2_CONFIRMATION_SALT:-}
    volumes:
      - ./docs/demos:/workspace/docs/demos

  otel-python-smoke:
    image: ${PALETTE_OTEL_PYTHON_IMAGE:-ghcr.io/jadenfix/palette/otel-python:main}
    profiles: ["tools"]
    depends_on:
      paletted:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://paletted:4317
      PALETTE_TENANT_ID: demo
      PALETTE_PROJECT_ID: demo
      PALETTE_ENVIRONMENT_ID: local
    command: ["python", "/examples/otel_smoke.py"]

  otel-python-quickstart:
    image: ${PALETTE_OTEL_PYTHON_IMAGE:-ghcr.io/jadenfix/palette/otel-python:main}
    profiles: ["tools"]
    depends_on:
      paletted:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://paletted:4317
    command: ["python", "/examples/five_line_otel.py"]

volumes:
  postgres-data:
  nats-data:
  minio-data:
  palette-data:
