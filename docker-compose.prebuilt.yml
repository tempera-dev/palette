name: beater

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: beater
      POSTGRES_USER: beater
      POSTGRES_PASSWORD: beater
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beater -d beater"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  beaterd:
    image: ${BEATERD_IMAGE:-ghcr.io/jadenfix/beater/beaterd:main}
    depends_on:
      postgres:
        condition: service_started
      nats:
        condition: service_started
      minio:
        condition: service_started
    environment:
      BEATER_TRACE_WRITE_DRAIN_INTERVAL_MS: "250"
      BEATER_TRACE_INGESTED_DRAIN_INTERVAL_MS: "250"
    ports:
      - "${BEATER_HTTP_PORT:-8080}:8080"
      - "${BEATER_OTLP_GRPC_PORT:-4317}:4317"
    volumes:
      - beater-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  dashboard:
    image: ${BEATER_DASHBOARD_IMAGE:-ghcr.io/jadenfix/beater/dashboard:main}
    depends_on:
      beaterd:
        condition: service_healthy
    environment:
      BEATER_API_BASE_URL: http://beaterd:8080
      NEXT_PUBLIC_BEATER_API_BASE_URL: http://localhost:${BEATER_HTTP_PORT:-8080}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "${BEATER_DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/?tenant=demo&project=demo&environment=local').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  dashboard-e2e:
    image: ${BEATER_DASHBOARD_E2E_IMAGE:-ghcr.io/jadenfix/beater/dashboard-e2e:main}
    profiles: ["proof"]
    depends_on:
      dashboard:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://dashboard:3000
    volumes:
      - ./docs/demos:/workspace/docs/demos

volumes:
  postgres-data:
  nats-data:
  minio-data:
  beater-data:
