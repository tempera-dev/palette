[package]
name = "palette-store-sql"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
async-trait.workspace = true
base64.workspace = true
palette-core = { path = "../palette-core" }
palette-schema = { path = "../palette-schema" }
palette-store = { path = "../palette-store" }
chrono.workspace = true
rusqlite.workspace = true
serde_json.workspace = true
# Scale TraceStore backends. Compiled by default so the trait impls and the
# conformance harness always type-check; the live integration tests against a
# real server are `#[ignore]`d and only run on a Docker CI runner.
tokio = { workspace = true, optional = true }
tokio-postgres = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }

[features]
default = ["postgres", "clickhouse"]
# Postgres-backed `TraceStore` (hot store / control-plane path).
postgres = ["dep:tokio", "dep:tokio-postgres"]
# ClickHouse-backed `TraceStore` (scale path, driven over the HTTP interface).
clickhouse = ["dep:tokio", "dep:reqwest"]

[dev-dependencies]
palette-store-conformance = { path = "../palette-store-conformance" }
palette-store-memory = { path = "../palette-store-memory" }
palette-store-obj = { path = "../palette-store-obj" }
tempfile.workspace = true
tokio.workspace = true
# Live Postgres/ClickHouse integration tests spin up throwaway containers; the
# tests are `#[ignore]`d so a Docker-less `cargo test` still passes.
testcontainers.workspace = true

[lints]
workspace = true
