[package]
name = "beater-stats"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Pure-math statistics primitives for Beater agent evals (Wilson CI, two-proportion z-test, bootstrap CI, paired-t, exact McNemar, multiplicity correction)."

# The default build's only runtime dependency is `thiserror` for the error enum;
# all math (normal/Student-t quantiles, incomplete beta, exact binomial tail,
# bootstrap) is self-contained so the crate pulls in no async/network or
# heavyweight numerics stack.  See §6.3 and §10.3 in ARCHITECTURE.md for the
# statistical contracts implemented here.
#
# The optional `parallel` feature (off by default) adds `rayon` so the bootstrap
# evaluates its independent resamples across cores.  It is purely an accelerator:
# resamples are seeded per-index, so the parallel and sequential paths return
# bit-identical, reproducible intervals.

[features]
default = []
parallel = ["dep:rayon"]

[dependencies]
thiserror = { workspace = true }
rayon = { workspace = true, optional = true }

[lints]
workspace = true
