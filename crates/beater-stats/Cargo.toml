[package]
name = "beater-stats"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Pure-math statistics primitives for Beater agent evals (Wilson CI, two-proportion z-test, bootstrap CI, paired-t, exact McNemar)."

# The only runtime dependency is `thiserror` for the error enum; all math
# (normal/Student-t quantiles, incomplete beta, exact binomial tail, bootstrap)
# is self-contained so the crate pulls in no async/network or heavyweight
# numerics stack.  See §6.3 and §10.3 in ARCHITECTURE.md for the statistical
# contracts implemented here.

[dependencies]
thiserror = { workspace = true }

