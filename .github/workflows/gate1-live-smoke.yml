name: gate1-live-smoke

# Supersede an in-flight run when a PR branch is pushed again, so the shared CI
# runner pool is not starved by stacked redundant runs. main pushes are never
# cancelled (their CI history must stay complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Gate 1 live runtime smoke
        run: cargo test -p beaterd --test live_smoke -- --test-threads=1
