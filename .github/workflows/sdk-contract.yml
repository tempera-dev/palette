name: sdk-contract

# Zero-drift gate: a handler change that isn't regenerated into the spec + every
# SDK client cannot merge, and breaking contract changes are flagged.
#
# This workflow owns ONLY the drift/regeneration checks. The route-coverage test
# (`beater-api --test openapi_coverage`) and the semconv normalizer guard
# (`beater-otlp`) run under the `backend` workflow's `cargo test --workspace`,
# so they are not re-run here.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semconv-drift:
    name: semantic conventions in sync across SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate conventions.json and fail on drift
        run: |
          cargo xtask regen-semconv
          git diff --exit-code -- sdks/semconv/conventions.json
      - name: Every SDK semconv matches the single source
        run: python3 scripts/check-semconv-drift.py

  sdk-drift:
    name: spec + 7 SDK clients in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate spec + all 7 SDK clients and fail on drift
        run: scripts/regen-sdks.sh --check

  breaking-change:
    name: additive-only contract policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate current spec
        run: cargo run -q -p beater-api --example dump_openapi > /tmp/new-spec.json
      - name: Get base spec
        run: git show "origin/${{ github.base_ref || 'main' }}:sdks/openapi/beater-api.json" > /tmp/base-spec.json || echo '{}' > /tmp/base-spec.json
      - name: oasdiff breaking-change check (additive-only policy)
        run: |
          docker run --rm -v /tmp:/specs tufin/oasdiff breaking \
            /specs/base-spec.json /specs/new-spec.json --fail-on ERR
