name: sdk-contract

# Supersede an in-flight run when a PR branch is pushed again, so the shared CI
# runner pool is not starved by stacked redundant runs. main pushes are never
# cancelled (their CI history must stay complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Zero-drift gate (one combined check): a handler change that isn't regenerated
# into the spec + every SDK client cannot merge, and breaking contract changes
# are flagged. The route-coverage test (`beater-api --test openapi_coverage`)
# and the semconv normalizer guard (`beater-otlp`) run under the `backend`
# workflow's `cargo test --workspace`, so they are not re-run here.

on:
  pull_request:
  # Re-run the zero-drift contract gate on the merged result of each queued PR so
  # a contract change that only conflicts post-merge cannot reach main (#343).
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: contract in sync (semconv + 7 SDKs + additive-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Semantic conventions in sync across all SDKs
        run: |
          cargo xtask regen-semconv
          git diff --exit-code -- sdks/semconv/conventions.json
          python3 scripts/check-semconv-drift.py

      - name: Spec + all 7 SDK clients in sync
        run: scripts/regen-sdks.sh --check

      - name: API shape consistency audit
        run: python3 scripts/audit-api-shapes.py

      - name: Contract-sync checker self-test
        run: |
          python3 -m py_compile scripts/tests/test_check_contract_sync.py
          python3 scripts/tests/test_check_contract_sync.py

      - name: Additive-only contract policy (oasdiff)
        run: |
          cargo run -q -p beater-api --example dump_openapi > /tmp/new-spec.json
          git show "origin/${{ github.base_ref || 'main' }}:sdks/openapi/beater-api.json" \
            > /tmp/base-spec.json || echo '{}' > /tmp/base-spec.json
          docker run --rm -v /tmp:/specs tufin/oasdiff breaking \
            /specs/base-spec.json /specs/new-spec.json --fail-on ERR
