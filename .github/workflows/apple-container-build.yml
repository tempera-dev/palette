name: apple-container-build

# Build (and smoke-run) the beaterd image with Apple's native `container` runtime
# on an Apple-silicon macOS runner. Mirrors the Docker build, proving the same
# Dockerfile is portable across both runtimes. Apple `container` requires
# macOS 26 + Apple silicon (https://github.com/apple/container).
on:
  push:
    branches: [main, apple-container]
  pull_request:
    paths:
      - "Dockerfile"
      - "scripts/container-runtime.sh"
      - "scripts/build-image.sh"
      - "scripts/run-beaterd.sh"
      - ".github/workflows/apple-container-build.yml"
  workflow_dispatch:

jobs:
  build:
    # Apple `container` needs macOS 26 on Apple silicon. Pin when the GA label
    # is available; macos-26 is the arm64 image.
    runs-on: macos-26
    timeout-minutes: 60
    # NON-BLOCKING (hosted-runner hard limitation): Apple `container` builds and
    # runs Linux containers inside a lightweight VM via Apple's
    # Virtualization.framework. GitHub's hosted arm64 macOS runners are
    # themselves VMs and Apple's framework does not support nested
    # virtualization on arm64, so `container build`/`run` abort with
    # `VZErrorDomain Code=2 "Virtualization is not available on this hardware."`
    # The earlier steps now pass — the GitHub API 403 is fixed and
    # `container system start --enable-kernel-install` starts the system and
    # installs the kernel non-interactively — but the actual image build/run
    # cannot execute on a hosted runner. We therefore keep the job for its
    # diagnostic value without letting the VM limitation red the PR.
    # TODO: move to a self-hosted bare-metal Apple-silicon runner (or a hosted
    # runner once GitHub exposes nested virtualization on arm64) and drop
    # continue-on-error. Refs:
    #   https://github.com/actions/runner-images/issues/12933
    #   https://github.com/apple/container/issues/1254
    continue-on-error: true
    # Authenticate the api.github.com call below so it is billed against this
    # repo's token bucket rather than the shared unauthenticated pool (which is
    # IP-rate-limited and returns 403 on busy runners).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Apple container
        run: |
          set -euo pipefail
          # Authenticated + versioned-media-type request: unauthenticated calls
          # to the GitHub REST API share a low per-IP rate limit and routinely
          # 403 on shared macOS runners.
          url="$(curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/apple/container/releases/latest \
            | grep -oE 'https://[^"]+\.pkg' | head -1)"
          echo "Installing $url"
          curl -fsSL "$url" -o /tmp/container.pkg
          sudo installer -pkg /tmp/container.pkg -target /
          container --version

      - name: Start container system
        # On a fresh runner no default kernel is configured, so `container
        # system start` prompts "Install the recommended default kernel ...?
        # [Y/n]" and, with no TTY/stdin on the GitHub runner, aborts with
        # "failed to read user input". `--enable-kernel-install` answers that
        # prompt non-interactively (the documented default for `system start`
        # is "prompt user"; this flag forces the install path instead).
        run: container system start --enable-kernel-install

      - name: Build beaterd image on Apple container
        run: BEATER_CONTAINER_RUNTIME=container scripts/build-image.sh beaterd:ci

      - name: Smoke-run beaterd on Apple container
        run: BEATER_CONTAINER_RUNTIME=container scripts/run-beaterd.sh beaterd:ci

      - name: Stop system
        if: always()
        run: container system stop || true
