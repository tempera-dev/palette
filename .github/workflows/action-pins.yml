name: action-pins

# Supply-chain gate: third-party GitHub Actions must be pinned to immutable commit
# SHAs so an upstream tag move or repo compromise cannot change code that runs in
# CI with deploy/publish credentials. See issue #135 and scripts/check-action-pins.sh.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/check-action-pins.sh"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-action-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all third-party actions are pinned to commit SHAs
        run: scripts/check-action-pins.sh
