name: deploy-backend

# Deploy the Beater backend (beaterd) to Fly.io on push to main.
#
# Secret-clean: the deploy needs a single repo secret, FLY_API_TOKEN
# (Settings -> Secrets and variables -> Actions). The job no-ops with a clear
# message when the secret is absent, so forks and unconfigured repos stay green
# (same pattern as release.yml). All runtime secrets live in `fly secrets`, never
# here. See docs/hosting.md.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "bins/**"
      - "Dockerfile"
      - ".dockerignore"
      - "fly.toml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Guard on FLY_API_TOKEN
        id: guard
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set; skipping deploy (expected on forks)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
      - name: Set up flyctl
        if: steps.guard.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        if: steps.guard.outputs.skip != 'true'
        run: flyctl deploy --remote-only
      - name: Smoke check /health
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        run: |
          url="$(flyctl status --json | python3 -c 'import json,sys;print(json.load(sys.stdin)["Hostname"])')"
          curl -fsS "https://${url}/health" && echo "health ok"
