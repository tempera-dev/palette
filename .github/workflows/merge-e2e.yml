name: merge-e2e

# Deep product-loop gate for merge candidates. The narrower backend/sdk/browser/
# live-smoke workflows cover normal pull_request iteration; this workflow
# intentionally composes them into one heavier cross-surface proof for the merge
# queue, main, and explicit operator dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  RUST_BACKTRACE: "1"

jobs:
  deep-merge-e2e:
    name: deep merge E2E (API + MCP + SDK + CLI)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PALETTE_CONFORMANCE_REQUIRE: python,typescript,rust,go
      PALETTE_E2E_PORT: "18120"
      PALETTE_E2E_GRPC_PORT: "14357"
      PALETTE_E2E_VENV: /tmp/palette-merge-e2e-py
      COMPOSE_PROJECT_NAME: palette-merge-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      PALETTE_HTTP_PORT: "18082"
      PALETTE_OTLP_GRPC_PORT: "14347"
      PALETTE_DASHBOARD_PORT: "13082"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Deep merge E2E
        run: scripts/e2e-merge-gate.sh

      - name: Compose diagnostics
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" ps || true
          # Capture container logs (esp. paletted) so a startup crash that exits
          # before the healthcheck — invisible to `ps` once the container is gone —
          # is recoverable from the run log.
          docker compose -p "$COMPOSE_PROJECT_NAME" logs --no-color --timestamps || true
