name: browser-e2e

# Real-browser + SDK end-to-end for the browser-agent observability feature:
# real Chrome (CDP backend) + Playwright + browser-use (Python) and Stagehand
# (TS) SDK span mapping, via scripts/browser-e2e.sh. Native Safari (safaridriver)
# is macOS/interactive-only and is skipped here.
#
# The browser crates' deterministic unit/integration tests run in the `backend`
# workflow (`cargo test --workspace`), so they are NOT re-run here.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  RUST_BACKTRACE: "1"

jobs:
  browser-live:
    name: real browser + SDK e2e
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome (CDP backend)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install browser-use SDK test deps
        run: python -m pip install --upgrade pip opentelemetry-sdk opentelemetry-exporter-otlp pytest

      - name: Run browser e2e harness
        run: bash scripts/browser-e2e.sh
