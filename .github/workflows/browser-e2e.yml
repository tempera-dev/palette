name: browser-e2e

# End-to-end checks for the browser-agent observability feature.
#
# Two jobs:
#   browser-tests  — deterministic gate: every browser crate's unit/integration
#                    tests, including the full capture -> evaluate -> gate loop.
#                    No browser required; this is the required check.
#   browser-live   — best-effort real-browser + SDK e2e via scripts/browser-e2e.sh
#                    (real Chrome for the CDP backend, Playwright for its backend,
#                    browser-use Python + Stagehand TS SDK span mapping). Native
#                    Safari (safaridriver) is macOS/interactive-only and is
#                    skipped here.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  browser-tests:
    name: browser crates (deterministic)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Browser crate tests + full-loop harness
        run: |
          cargo test \
            -p beater-browser \
            -p beater-browser-capture \
            -p beater-eval \
            -p beater-otlp \
            -p beater-browser-playwright \
            -p beater-browser-webdriver \
            -p beater-browser-cdp \
            -p beater-browser-harness

  browser-live:
    name: real browser + SDK e2e
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome (CDP backend)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install browser-use SDK test deps
        run: python -m pip install --upgrade pip opentelemetry-sdk opentelemetry-exporter-otlp pytest

      - name: Run browser e2e harness
        run: bash scripts/browser-e2e.sh
