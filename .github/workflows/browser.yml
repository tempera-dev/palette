name: browser

# Supersede an in-flight run when a PR branch is pushed again, so the shared CI
# runner pool is not starved by stacked redundant runs. main pushes are never
# cancelled (their CI history must stay complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# The browser-agent feature, split into deterministic tests and live e2e.
#   browser-tests: the beater-browser-* crates' unit/integration tests
#                  (driver trait + conformance, capture, harness loop) — no
#                  browser required. Owned here, so `backend-tests` excludes them.
#   e2e-tests:     real Chrome (CDP) + Playwright conformance + the browser-use
#                  (Python) and Stagehand (TS) SDK span mapping, via
#                  scripts/browser-e2e.sh.

on:
  pull_request:
  # Validate the browser-agent suite against the merged result of each queued PR (#343).
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  RUST_BACKTRACE: "1"

jobs:
  browser-tests:
    name: browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Test the browser crates
        run: |
          cargo test \
            -p beater-browser \
            -p beater-browser-capture \
            -p beater-browser-cdp \
            -p beater-browser-harness \
            -p beater-browser-playwright \
            -p beater-browser-webdriver

  e2e-tests:
    name: e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Chrome (CDP backend)
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable
      - name: Install browser-use SDK test deps
        run: python -m pip install --upgrade pip opentelemetry-sdk opentelemetry-exporter-otlp pytest
      - name: Run live browser + SDK e2e
        run: bash scripts/browser-e2e.sh
