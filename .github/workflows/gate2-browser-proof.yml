name: gate2-browser-proof

# Gate 2 live browser proof (formerly the `live-browser-proof` job in
# dashboard-ui.yml): runs scripts/gate2-proof.sh in a Playwright container to
# exercise the real, end-to-end self-host browser proof. Kept separate from the
# frontend tests/lint, which now live in frontend.yml.

# Supersede an in-flight run when a PR branch is pushed again, so the shared CI
# runner pool is not starved by stacked redundant runs. main pushes are never
# cancelled (their CI history must stay complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  live-browser-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config
          rm -rf /var/lib/apt/lists/*

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Use stable Rust
        run: rustup default stable

      - name: Install dashboard dependencies
        working-directory: web/dashboard
        run: npm ci

      - name: Run Gate 2 live browser proof
        env:
          BEATER_GATE2_SKIP_PLAYWRIGHT_INSTALL: "1"
        run: scripts/gate2-proof.sh
