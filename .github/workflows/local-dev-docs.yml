name: local-dev-docs

# Supersede an in-flight run when a PR branch is pushed again, so the shared CI
# runner pool is not starved by stacked redundant runs. main pushes are never
# cancelled (their CI history must stay complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    paths:
      - ".github/workflows/local-dev-docs.yml"
      - "docs/local-dev.md"
      - "scripts/check-local-dev-docs.py"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-dev-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify local development docs
        run: python3 scripts/check-local-dev-docs.py
