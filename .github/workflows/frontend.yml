name: frontend

# The dashboard (web/dashboard), split into tests and lint.
#   frontend-tests: the render/read-client test suite + the production build.
#   frontend-lint:  TypeScript type-check + the generated API client drift check
#                   (the dashboard's lib/generated/api-types.ts must match the spec).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  frontend-tests:
    name: frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci
      - name: Test (render + read client)
        working-directory: web/dashboard
        run: npm test
      - name: Build
        working-directory: web/dashboard
        run: npm run build

  frontend-lint:
    name: frontend lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/dashboard/package-lock.json
      - name: Install Rust (for the generated-client drift check)
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Install dependencies
        working-directory: web/dashboard
        run: npm ci
      - name: TypeScript type-check
        working-directory: web/dashboard
        run: npx tsc --noEmit -p tsconfig.json
      - name: Generated API client in sync with the spec
        run: scripts/check-openapi-drift.sh
