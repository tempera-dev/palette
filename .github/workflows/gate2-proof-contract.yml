name: gate2-proof-contract

# Supersede an in-flight run when a PR branch is pushed again, so the shared CI
# runner pool is not starved by stacked redundant runs. main pushes are never
# cancelled (their CI history must stay complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Use stable Rust
        run: rustup default stable

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Validate Gate 2 outside-proof template
        run: |
          for script in \
            scripts/check-openapi-drift.sh \
            scripts/gate2-compose-stopwatch.sh \
            scripts/gate2-outside-local-preflight.sh \
            scripts/gate2-outside-run.sh \
            scripts/gate2-proof.sh \
            scripts/smoke-compose.sh \
            scripts/validate-gate2-outside-proof.sh
          do
            bash -n "$script"
          done
          python3 -m py_compile scripts/check-gate2-outside-readiness.py
          python3 -m py_compile scripts/check-gate2-public-handoff.py
          python3 -m py_compile scripts/check-gate0-foundations.py
          python3 -m py_compile scripts/generate-gate2-outside-proof.py
          python3 -m py_compile scripts/gate2_proof_contract.py
          python3 -m py_compile scripts/seed-gate2-redaction-trace.py
          python3 -m py_compile scripts/tests/test_check_gate2_outside_readiness.py
          python3 scripts/tests/test_check_gate2_outside_readiness.py
          scripts/validate-gate2-outside-proof.sh --allow-pending

      - name: Gate 0 foundation contract
        run: scripts/check-gate0-foundations.py

      - name: Gate 2 self-host contract tests
        run: |
          cargo test -p beaterd --test offline_compose
          cargo test -p beaterd --test self_host_contract
          cargo test -p beaterd --test gate2_outside_validator
