name: container-images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Verify container image contract
        run: python3 scripts/check-container-image-contract.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push paletted
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/paletted:${{ github.sha }}-${{ matrix.suffix }}
            ghcr.io/${{ github.repository }}/paletted:main-${{ matrix.suffix }}
          cache-from: type=gha,scope=paletted-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=paletted-${{ matrix.suffix }}

      - name: Build palettectl tools target
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: tools
          platforms: ${{ matrix.platform }}
          push: false
          tags: ghcr.io/${{ github.repository }}/palettectl-tools:ci-${{ matrix.suffix }}
          cache-from: |
            type=gha,scope=paletted-${{ matrix.suffix }}
            type=gha,scope=palettectl-tools-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=palettectl-tools-${{ matrix.suffix }}

      - name: Build and push dashboard
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./web/dashboard
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}-${{ matrix.suffix }}
            ghcr.io/${{ github.repository }}/dashboard:main-${{ matrix.suffix }}
          cache-from: type=gha,scope=dashboard-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=dashboard-${{ matrix.suffix }}

      - name: Build and push dashboard e2e runner
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./web/dashboard
          target: e2e
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard-e2e:${{ github.sha }}-${{ matrix.suffix }}
            ghcr.io/${{ github.repository }}/dashboard-e2e:main-${{ matrix.suffix }}
          cache-from: |
            type=gha,scope=dashboard-${{ matrix.suffix }}
            type=gha,scope=dashboard-e2e-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=dashboard-e2e-${{ matrix.suffix }}

      - name: Build and push OTEL Python runner
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./examples/python
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/otel-python:${{ github.sha }}-${{ matrix.suffix }}
            ghcr.io/${{ github.repository }}/otel-python:main-${{ matrix.suffix }}
          cache-from: type=gha,scope=otel-python-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=otel-python-${{ matrix.suffix }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish paletted manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/paletted:main \
            -t ghcr.io/${{ github.repository }}/paletted:${{ github.sha }} \
            ghcr.io/${{ github.repository }}/paletted:${{ github.sha }}-amd64 \
            ghcr.io/${{ github.repository }}/paletted:${{ github.sha }}-arm64

      - name: Publish dashboard manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/dashboard:main \
            -t ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }} \
            ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}-amd64 \
            ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}-arm64

      - name: Publish dashboard e2e manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/dashboard-e2e:main \
            -t ghcr.io/${{ github.repository }}/dashboard-e2e:${{ github.sha }} \
            ghcr.io/${{ github.repository }}/dashboard-e2e:${{ github.sha }}-amd64 \
            ghcr.io/${{ github.repository }}/dashboard-e2e:${{ github.sha }}-arm64

      - name: Publish OTEL Python runner manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/otel-python:main \
            -t ghcr.io/${{ github.repository }}/otel-python:${{ github.sha }} \
            ghcr.io/${{ github.repository }}/otel-python:${{ github.sha }}-amd64 \
            ghcr.io/${{ github.repository }}/otel-python:${{ github.sha }}-arm64

      - name: Install public handoff prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Checkout public handoff verifier
        uses: actions/checkout@v7

      - name: Verify Gate 2 public handoff readiness
        run: scripts/check-gate2-public-handoff.py --expected-commit "${{ github.sha }}"
