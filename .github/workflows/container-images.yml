name: container-images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push beaterd
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/beaterd:main
            ghcr.io/${{ github.repository }}/beaterd:${{ github.sha }}
          cache-from: type=gha,scope=beaterd
          cache-to: type=gha,mode=max,scope=beaterd

      - name: Build and push dashboard
        uses: docker/build-push-action@v7
        with:
          context: ./web/dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:main
            ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
