[package]
name = "palette"
version = "0.1.0"
edition = "2021"
description = "Ergonomic, OpenTelemetry-native agent observability SDK for Palette"
license = "Apache-2.0"
repository = "https://github.com/palette/palette"
readme = "README.md"

# This crate lives under `sdks/` which the root workspace excludes, so it owns
# its own (empty) workspace table to compile standalone with its own lockfile.
[workspace]

[dependencies]
opentelemetry = { version = "0.32", features = ["trace"] }
opentelemetry_sdk = { version = "0.32", features = ["trace", "rt-tokio"] }
opentelemetry-otlp = { version = "0.32", default-features = false, features = [
    "trace",
    "http-proto",
    "reqwest-blocking-client",
] }

[dev-dependencies]
# In-memory span exporter for offline tests (mirrors Python's InMemorySpanExporter).
opentelemetry_sdk = { version = "0.32", features = ["trace", "testing"] }
# `rt-multi-thread` for the `#[tokio::main]` adoption examples in examples/rust/.
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
# Only the deps the example bodies actually use (axum/reqwest); the `tracing` and
# `tonic` headers in those files are illustrative, so they need no extra deps.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
axum = "0.7"
reqwest = { version = "0.12", default-features = false, features = ["json"] }

[[example]]
name = "quickstart"
path = "examples/quickstart.rs"

# Repo-level adoption fixtures under examples/rust/ — registered here so CI
# `cargo build --examples` compiles them against the live SDK API (they were
# outside the workspace and could silently rot).
[[example]]
name = "tracing_app"
path = "../../examples/rust/tracing_app.rs"

[[example]]
name = "mcp_app"
path = "../../examples/rust/mcp_app.rs"

[[example]]
name = "reqwest_app"
path = "../../examples/rust/reqwest_app.rs"

[[example]]
name = "axum_app"
path = "../../examples/rust/axum_app.rs"

[[example]]
name = "tonic_app"
path = "../../examples/rust/tonic_app.rs"
