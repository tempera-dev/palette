[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "beater-browser-use"
version = "0.1.0"
description = "Beater instrumentation for the browser-use agent framework — emits canonical browser.* spans over OTLP"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "Beater" }]
keywords = ["observability", "browser-use", "agents", "opentelemetry", "tracing", "browser"]
dependencies = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "opentelemetry-exporter-otlp>=1.20.0",
]

[project.optional-dependencies]
# browser-use is an EXTRA: the unit tests mock it, so installing this package
# (and running the tests) never requires a live browser or the framework.
browser-use = ["browser-use>=0.1.0"]
dev = ["pytest>=7.0.0"]

[project.urls]
Homepage = "https://github.com/beater/beater"
Documentation = "https://github.com/beater/beater/tree/main/sdks/python-browser-use"

[tool.hatch.build.targets.wheel]
packages = ["beater_browser_use"]

[tool.pytest.ini_options]
testpaths = ["tests"]
