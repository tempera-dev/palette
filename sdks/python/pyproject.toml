[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "palette-sdk"
version = "0.1.0"
description = "Ergonomic agent observability SDK for Palette (OpenTelemetry-native)"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "Palette" }]
keywords = ["observability", "llm", "agents", "opentelemetry", "tracing"]
dependencies = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "opentelemetry-exporter-otlp-proto-http>=1.20.0",
]

[project.optional-dependencies]
grpc = ["opentelemetry-exporter-otlp-proto-grpc>=1.20.0"]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.30.0"]
groq = ["groq>=0.9.0"]
mistral = ["openai>=1.0.0"]
langchain = ["langchain-core>=0.1.0"]
llamaindex = ["llama-index-core>=0.10.0"]
dev = ["pytest>=7.0.0"]

[project.urls]
Homepage = "https://github.com/palette/palette"
Documentation = "https://github.com/palette/palette/tree/main/sdks/python"

[project.entry-points.opentelemetry_configurator]
palette = "palette.bootstrap:PaletteConfigurator"

[tool.hatch.build.targets.wheel]
packages = ["palette"]
